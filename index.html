
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
	    <img id="card" src="./assets/anokam-sportscard-1.png" />
	<!-- <a-asset-item id="avatarModel" src="./assets/anokam-collage.mp4"></a-asset-item> -->
         <video id="v" src="./assets/anokam-collage.mp4"
          loop
          muted
          playsinline
          webkit-playsinline
          autoplay
          preload="auto"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

       <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#v" position="0 0 0.1" width="1" height="0.552"></a-video>
      </a-entity>
    </a-scene>

   <script>
  const video = document.querySelector("#v");
  const target = document.querySelector("[mindar-image-target]");

  target.addEventListener("targetFound", async () => {
    try { await video.play(); } catch (e) { console.log("play blocked", e); }
  });

  target.addEventListener("targetLost", () => {
    video.pause();
    // optional: rewind when you lose the target
    video.currentTime = 0;
  });
</script>

  </body>
</html>
