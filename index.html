
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
	    <img id="card" src="./assets/anokam-sportscard-1.png" />

         <video id="v1" src="./assets/anokam-collage.mp4"
          loop
          muted
          playsinline
          webkit-playsinline
          autoplay
          preload="auto"></video>

        <video id="v2"  src="./assets/anokam-intro.mp4"
        loop
        muted
        playsinline
        webkit-playsinline
        autoplay
        preload="auto"></video>

        <a-asset-item id="model1" src="./assets/superbowl_trophy_webAR.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

       <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#v1" position="1 0 0" width="1" height="1"></a-video>

        <a-video src="#v2" position="-1 0 0" width="1" height="1"></a-video>

        <a-gltf-model src="#model1" position="0 1 0" scale="0.1 0.1 0.1" rotation="0 0 0"></a-gltf-model>
      </a-entity>
    </a-scene>

   <script>
  const video1 = document.querySelector("#v1");
  const video2 = document.querySelector("#v2");
  const target = document.querySelector("[mindar-image-target]");

  target.addEventListener("targetFound", async () => {
    try { 
      video1.currentTime = 0;
      video2.currentTime = 0;
      await video1.play();
      await video2.play();
     } catch (e) { console.log("play blocked", e); }
  });

  target.addEventListener("targetLost", () => {
    video1.pause();
    video2.pause();
    video1.currentTime = 0;
    video2.currentTime = 0;
    // optional: rewind when you lose the target
    // video.currentTime = 0;
  });
</script>

  </body> 
</html>
